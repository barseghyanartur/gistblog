name: gist-blog

on:
  schedule:
    - cron: '*/15 * * * *'  # Runs every 15 minutes, every hour, every day
  workflow_dispatch:        # manual trigger

permissions:
  contents: write
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Gists + Generate Search Index
        run: |
          python fetch_gists.py
          python generate_search_index.py

      - name: Build with Pelican
        run: pelican content -o output -s pelicanconf.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
