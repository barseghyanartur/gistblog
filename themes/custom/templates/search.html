{% extends "base.html" %}

{% block title %}Search – {{ SITENAME }}{% endblock %}

{% block content %}
<section id="content" class="body">
  <h1 class="entry-title">Search</h1>

  <div id="search-form" style="margin-bottom: 1.5rem;">
    <input
      type="text"
      id="search-input"
      placeholder="Search posts…"
      autofocus
      style="width:100%; padding:0.6rem 0.8rem; font-size:1rem;
             border:1px solid #ccc; border-radius:4px; box-sizing:border-box;"
    />
  </div>

  <div id="search-results"></div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lunr.js/2.3.9/lunr.min.js"
        integrity="sha512-4xUl/d6D6THrAnXAwGajXkoWaeMNwEKK4iNfq5DotEbLPAfk6FSxSP3ydNxqDgCw1c/0Z1Jg6L8h2j+++9BZg=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script>
(function () {
  // SITEURL is injected by Pelican via the template context.
  // Using a relative path with SITEURL ensures this works both locally
  // (SITEURL="") and on GitHub Pages (SITEURL="/gist-blog").
  var SITEURL = "{{ SITEURL }}";
  var indexUrl = SITEURL + "/static/search_index.json";

  var posts = [];
  var idx = null;

  var input   = document.getElementById("search-input");
  var results = document.getElementById("search-results");

  function render(hits) {
    if (!hits.length) {
      results.innerHTML = "<p>No results found.</p>";
      return;
    }
    var html = hits.map(function (h) {
      var post = posts[h.ref];
      var url  = SITEURL + "/" + post.url;
      var tags = (post.tags || []).map(function (t) {
        return '<span style="background:#eee;padding:2px 6px;border-radius:3px;'
             + 'font-size:0.78rem;margin-right:4px;">' + t + '</span>';
      }).join("");
      return '<article style="margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid #eee;">'
           + '<h2 style="margin-bottom:0.25rem;">'
           + '<a href="' + url + '">' + post.title + '</a></h2>'
           + '<p style="font-size:0.85rem;color:#888;margin:0 0 0.5rem;">'
           + post.date + ' &nbsp;·&nbsp; ' + post.category + '</p>'
           + (post.summary
               ? '<p style="margin:0.5rem 0;">' + post.summary + '</p>'
               : '')
           + (tags ? '<p style="margin-top:0.4rem;">' + tags + '</p>' : '')
           + '</article>';
    }).join("");
    results.innerHTML = html;
  }

  function search(query) {
    query = query.trim();
    if (!idx || !query) {
      results.innerHTML = "";
      return;
    }
    // Wildcard on every term so partial words match
    var q = query.split(/\s+/).map(function (t) {
      return t + "*";
    }).join(" ");
    var hits;
    try {
      hits = idx.search(q);
    } catch (_) {
      // Fall back to plain query if wildcard is invalid
      try { hits = idx.search(query); } catch (_2) { hits = []; }
    }
    render(hits);
  }

  // Fetch the index, build Lunr, run any pending query
  fetch(indexUrl)
    .then(function (r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    })
    .then(function (data) {
      // Store as an object keyed by position so lunr ref works
      data.forEach(function (p, i) { posts[i] = p; });

      idx = lunr(function () {
        this.ref("id");
        this.field("title",   { boost: 10 });
        this.field("summary", { boost: 5  });
        this.field("content", { boost: 1  });
        this.field("tags",    { boost: 3  });
        this.field("category");

        data.forEach(function (p, i) {
          this.add({
            id:       i,
            title:    p.title   || "",
            summary:  p.summary || "",
            content:  p.content || "",
            tags:     (p.tags || []).join(" "),
            category: p.category || "",
          });
        }, this);
      });

      // If the user already typed while loading, run the search now
      if (input.value.trim()) {
        search(input.value);
      }
    })
    .catch(function (err) {
      results.innerHTML = '<p style="color:red;">Could not load search index: ' + err + '</p>';
    });

  input.addEventListener("input", function () {
    search(this.value);
  });

  // Also support ?q=... in the URL
  var params = new URLSearchParams(window.location.search);
  var q = params.get("q");
  if (q) {
    input.value = q;
    // Search will fire once the index is loaded (handled above)
  }
})();
</script>
{% endblock %}
