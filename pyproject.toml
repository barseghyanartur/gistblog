 [tool.sphinx-source-tree]
   ignore = [
       "__pycache__",
       "*.pyc",
       "*.pyo",
       "*.py,cover",
       ".git",
       ".hg",
       ".svn",
       ".tox",
       ".nox",
       ".venv",
       "venv",
       "env",
       "*.egg-info",
       "dist",
       "build",
       "node_modules",
       ".mypy_cache",
       ".pytest_cache",
       ".coverage",
       "htmlcov",
       ".idea",
       ".vscode",
       ".DS_Store",
       "Thumbs.db",
       ".ruff_cache",
       ".coverage.*",
       ".secrets.baseline",
       ".pre-commit-config.yaml",
       ".pre-commit-hooks.yaml",
       ".readthedocs.yaml",
       "content",
       "output",
   ]
   order = [
       "README.rst",
       "AGENTS.md",
   ]
