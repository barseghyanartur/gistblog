<footer class="post-info minimal">
        <span class="post-date">{{ article.date.strftime('%Y-%m-%d') }}</span>
        {% if article.category %}<span class="post-category"> | <a href="{{ SITEURL }}/{{ article.category.url }}">{{ article.category }}</a></span>{% endif %}
        {% if article.tags %}<span class="post-tags"> | {% for tag in article.tags %}<a href="{{ SITEURL }}/{{ tag.url }}">{{ tag }}</a>{% if not loop.last %}, {% endif %}{% endfor %}</span>{% endif %}
</footer>
