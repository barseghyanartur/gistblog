<script>
(function () {
  var SITEURL = "/gist-blog";
  var indexUrl = SITEURL + "/static/search_index.json";

  var searchBox    = document.getElementById("search-box");
  var resultsList  = document.getElementById("search-results");
  var statusEl     = document.getElementById("search-status");
  var posts        = null;

  function escapeRegex(s) {
    return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  }

  function highlight(text, terms) {
    var re = new RegExp("(" + terms.map(escapeRegex).join("|") + ")", "gi");
    return text.replace(re, "<mark>$1</mark>");
  }

  function snippet(text, terms, maxLen) {
    maxLen = maxLen || 200;
    var re = new RegExp(escapeRegex(terms[0]), "i");
    var idx = text.search(re);
    var start = Math.max(0, idx - 80);
    var chunk = text.slice(start, start + maxLen);
    if (start > 0) chunk = "…" + chunk;
    if (start + maxLen < text.length) chunk += "…";
    return chunk;
  }

  function score(post, terms) {
    var pts = 0;
    terms.forEach(function (t) {
      var re = new RegExp(escapeRegex(t), "gi");
      var titleMatches   = (post.title   || "").match(re) || [];
      var contentMatches = (post.content || "").match(re) || [];
      var tagMatches     = (post.tags    || []).join(" ").match(re) || [];
      pts += titleMatches.length * 10 + tagMatches.length * 5 + contentMatches.length;
    });
    return pts;
  }

  function renderResults(results, terms) {
    resultsList.innerHTML = "";
    if (results.length === 0) {
      statusEl.textContent = "No results found.";
      return;
    }
    statusEl.textContent = results.length + " result" + (results.length !== 1 ? "s" : "") + " found.";
    results.forEach(function (post) {
      var li      = document.createElement("li");
      var rawSnip = snippet(post.content || post.summary || "", terms);
      var hlTitle = highlight(post.title || "Untitled", terms);
      var hlSnip  = highlight(rawSnip, terms);
      var tags    = (post.tags || []).filter(Boolean).map(function (t) {
        return '<span style="background:#eef;padding:1px 6px;border-radius:3px;margin-right:4px;">' + t + '</span>';
      }).join("");
      li.innerHTML = (
        '<h3><a href="' + SITEURL + '/' + post.url + '">' + hlTitle + "</a></h3>" +
        '<div class="meta">' + (post.date || "") + (post.category ? " &nbsp;·&nbsp; " + post.category : "") + (tags ? " &nbsp;·&nbsp; " + tags : "") + "</div>" +
        '<div class="snippet">' + hlSnip + "</div>"
      );
      resultsList.appendChild(li);
    });
  }

  function doSearch(query) {
    if (!posts) return;
    var q = query.trim().toLowerCase();
    if (!q) {
      resultsList.innerHTML = "";
      statusEl.textContent = "";
      return;
    }
    var terms = q.split(/\s+/).filter(Boolean);
    var hits = posts.filter(function (post) {
      return terms.every(function (t) {
        var haystack = [
          (post.title    || ""),
          (post.content  || ""),
          (post.summary  || ""),
          (post.category || ""),
          (post.tags     || []).join(" ")
        ].join(" ").toLowerCase();
        return haystack.indexOf(t) !== -1;
      });
    });
    hits.sort(function (a, b) { return score(b, terms) - score(a, terms); });
    renderResults(hits, terms);
  }

  // Load the index
  fetch(indexUrl)
    .then(function (r) { return r.json(); })
    .then(function (data) {
      posts = data;
      statusEl.textContent = "Ready. Type to search " + posts.length + " posts.";
      // Run a search immediately if the box was pre-filled (e.g. back-navigation)
      if (searchBox.value.trim()) doSearch(searchBox.value);
    })
    .catch(function () {
      statusEl.textContent = "Could not load search index.";
    });

  searchBox.addEventListener("input", function () { doSearch(this.value); });
})();
</script>
