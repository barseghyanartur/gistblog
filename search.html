<section id="content" class="body">
    <h1>Search the blog</h1>
    <hr />
    <p style="margin-bottom: 1.5rem; color: #555;">
        Search posts by title, content, summary, tags, or category.
    </p>

    <input
        type="search"
        id="search-input"
        placeholder="Type to search..."
        autofocus
        style="width: 100%; max-width: 700px; padding: 14px 18px; font-size: 1.1rem; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 2rem;"
    >

    <div id="search-results"></div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lunr.js/2.3.9/lunr.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
    const searchInput = document.getElementById("search-input");
    const resultsContainer = document.getElementById("search-results");

    let lunrIndex;
    let documentsData = [];

    // Handle SITEURL correctly (works with /gist-blog or root deployments)
    const SITEURL = "/gistblog";
    const baseUrl = SITEURL ? (SITEURL.endsWith("/") ? SITEURL : SITEURL + "/") : "/";
    const searchIndexUrl = baseUrl + "static/search_index.json";

    // Load and index the search data
    fetch(searchIndexUrl)
        .then(response => {
            if (!response.ok) throw new Error("Failed to load search index");
            return response.json();
        })
        .then(data => {
            documentsData = data;

            lunrIndex = lunr(function () {
                this.ref("url");
                this.field("title", { boost: 15 });
                this.field("content", { boost: 10 });
                this.field("summary", { boost: 8 });
                this.field("tags", { boost: 6 });
                this.field("category", { boost: 3 });

                documentsData.forEach(doc => this.add(doc));
            });

            console.log(`✅ Search index ready — ${documentsData.length} posts indexed`);

            // Support ?q=... in URL
            const urlParams = new URLSearchParams(window.location.search);
            const initialQuery = urlParams.get("q");
            if (initialQuery) {
                searchInput.value = initialQuery;
                performSearch(initialQuery);
            }
        })
        .catch(err => {
            console.error(err);
            resultsContainer.innerHTML = `<p style="color:#d32f2f;">⚠️ Search index could not be loaded. Please try again later.</p>`;
        });

    function performSearch(query) {
        if (!lunrIndex || !query || query.trim() === "") {
            resultsContainer.innerHTML = "";
            return;
        }

        const results = lunrIndex.search(query);

        let html = `<p class="search-count" style="margin-bottom:1rem;color:#555;font-weight:500;">
            Found ${results.length} result${results.length !== 1 ? "s" : ""} for <strong>“${query}”</strong>
        </p>`;

        if (results.length === 0) {
            html += `<p style="color:#666;">No matching posts found. Try different keywords.</p>`;
        } else {
            html += `<ul style="list-style:none;padding:0;margin:0;">`;
            results.forEach(result => {
                const doc = documentsData.find(d => d.url === result.ref);
                if (!doc) return;

                const fullUrl = baseUrl + (doc.url.startsWith("/") ? doc.url.slice(1) : doc.url);
                const summary = doc.summary && doc.summary.trim()
                    ? doc.summary
                    : (doc.content ? doc.content.substring(0, 250) + "..." : "");

                html += `
                <li style="margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:1px solid #eee;">
                    <a href="${fullUrl}" style="text-decoration:none;color:inherit;">
                        <h2 style="margin:0 0 0.4rem 0;font-size:1.35rem;">${doc.title}</h2>
                    </a>
                    <div style="font-size:0.9rem;color:#777;margin-bottom:0.6rem;">
                        ${doc.date} • ${doc.category}
                        ${doc.tags && doc.tags.length ? ` • ${doc.tags.join(", ")}` : ""}
                    </div>
                    <p style="margin:0;color:#444;line-height:1.5;">${summary}</p>
                </li>`;
            });
            html += `</ul>`;
        }

        resultsContainer.innerHTML = html;
    }

    // Live search with small debounce
    let timeout;
    searchInput.addEventListener("input", function () {
        clearTimeout(timeout);
        timeout = setTimeout(() => {
            performSearch(this.value);
        }, 150);
    });
});
</script>
