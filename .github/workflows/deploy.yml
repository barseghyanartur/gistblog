name: gist-blog

on:
  push:
    branches:
      - main
  schedule:
    - cron: '*/15 * * * *'  # Runs every 15 minutes, every hour, every day
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install package
        run: uv pip install -e .

      - name: Fetch Gists + Generate Search Index
        run: |
          uv run gistblog-fetch-data
          uv run gistblog-build-search-index

      - name: Build with Pelican
        run: uv run pelican content -o output -s pelicanconf.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
